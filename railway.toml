[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "dog-breed-classifier"

[services.variables]
PORT = "8501"

[services.ports]
port = 8501

[[services]]
source = "."
name = "dog-breed-classifier"
